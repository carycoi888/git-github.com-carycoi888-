[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/opportunities"
  to = "/opportunities.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/opportunities.html"
  status = 200
